<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPM — Cofre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/vault.css">
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><span class="mark"><i class="ti ti-shield-lock"></i></span> PPM</div>
      <nav class="nav">
        <a class="nav-item on" data-view="cofre" href="#"><i class="ti ti-key"></i> Cofre</a>
        <a class="nav-item" data-view="favorites" href="#"><i class="ti ti-star"></i> Favoritos</a>
        <a class="nav-item" data-view="categories" href="#"><i class="ti ti-folder"></i> Categorias</a>
        <a class="nav-item" data-view="security" href="#"><i class="ti ti-shield-check"></i> Segurança</a>
        <a class="nav-item" data-view="settings" href="#"><i class="ti ti-settings"></i> Ajustes</a>
      </nav>
      <div class="side-foot">
        <div class="score-card">
          <div class="lbl"><i class="ti ti-shield-check"></i> Saúde do cofre</div>
          <div class="val" id="vaultHealth">—</div>
          <div class="score-bar"><span id="vaultHealthBar"></span></div>
        </div>
        <button id="logoutBtn" class="logout"><i class="ti ti-logout"></i> Sair</button>
      </div>
    </aside>

    <section class="main">
      <header class="top">
        <h1 id="viewTitle">Cofre</h1>
        <div class="search"><i class="ti ti-search"></i><input id="searchInput" placeholder="Buscar serviço..."></div>
        <button id="openCreateModalBtn" class="add"><i class="ti ti-plus"></i><span class="add-label">Nova senha</span></button>
        <div class="ava" id="userAvatar">·</div>
      </header>

      <div class="body">
        <div id="viewArea"></div>
      </div>
    </section>
  </div>

  <nav class="bottomnav">
    <a class="nav-item on" data-view="cofre" href="#"><i class="ti ti-key"></i><span>Cofre</span></a>
    <a class="nav-item" data-view="favorites" href="#"><i class="ti ti-star"></i><span>Favoritos</span></a>
    <a class="nav-item" data-view="categories" href="#"><i class="ti ti-folder"></i><span>Categorias</span></a>
    <a class="nav-item" data-view="security" href="#"><i class="ti ti-shield-check"></i><span>Segurança</span></a>
    <a class="nav-item" data-view="settings" href="#"><i class="ti ti-settings"></i><span>Ajustes</span></a>
  </nav>

  <div class="modal" id="passwordModal">
    <div class="modal-content">
      <h3 id="modalTitle">Nova senha</h3>
      <div class="field"><label for="formService">Serviço</label><input class="input" id="formService" placeholder="Ex: Netflix"></div>
      <div class="field"><label for="formEmail">E-mail</label><input class="input" id="formEmail" type="email" placeholder="email@exemplo.com"></div>
      <div class="field"><label for="formPassword">Senha</label><input class="input" id="formPassword" placeholder="a senha do serviço"></div>
      <div class="field"><label for="formUsername">Usuário (opcional)</label><input class="input" id="formUsername"></div>
      <div class="field"><label for="formDescription">Descrição (opcional)</label><textarea class="input" id="formDescription"></textarea></div>
      <div class="modal-actions">
        <button id="closeModalBtn" class="btn">Cancelar</button>
        <button id="savePasswordBtn" class="btn btn-primary">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/manager.js"></script>
</body>
</html>
