<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPM — Verificar código</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand"><span class="mark"><i class="ti ti-shield-lock"></i></span> PPM</div>
      <h2>Verificar código</h2>
      <p class="auth-sub">Enviamos um código de uso único pro seu e-mail</p>
      <form id="verifyOtpForm">
        <div class="field">
          <label for="otp">Código</label>
          <input class="input otp-input" id="otp" inputmode="numeric" autocomplete="one-time-code" placeholder="0000000000" required>
        </div>
        <button type="submit" class="btn btn-primary">Confirmar</button>
      </form>
      <button type="button" class="resend" id="btnResendOtp">Reenviar código</button>
      <p class="auth-back"><a href="login.html">Voltar pro login</a></p>
    </div>
  </div>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
